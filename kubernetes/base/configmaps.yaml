apiVersion: v1
kind: ConfigMap
metadata:
  name: lyra-config
  namespace: lyra-core
data:
  REDIS_URL: "redis://redis-0.redis-headless.lyra-data.svc.cluster.local:6379"
  POSTGRES_URL: "postgresql+asyncpg://lyra_user:lyra_pass@postgres-0.postgres-headless.lyra-data.svc.cluster.local/lyra_db"
  NEO4J_URI: "bolt://neo4j-0.neo4j-headless.lyra-data.svc.cluster.local:7687"
  OLLAMA_HOST: "http://ollama.lyra-core.svc.cluster.local:11434"
  ENVIRONMENT: "production"
  LOG_LEVEL: "INFO"
---
apiVersion: v1
kind: Secret
metadata:
  name: lyra-secrets
  namespace: lyra-core
type: Opaque
stringData:
  POSTGRES_USER: "lyra_user"
  POSTGRES_PASSWORD: "lyra_enterprise_password_123"
  NEO4J_USER: "neo4j"
  NEO4J_PASSWORD: "lyra_graph_password_123"
  JWT_SECRET: "lyra_super_secret_jwt_key_456"
