apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lyra-ingress
  namespace: lyra-core
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.lyra.ai
    - dashboard.lyra.ai
    secretName: lyra-tls-secret
  rules:
  - host: api.lyra.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
  - host: dashboard.lyra.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana-service # Assuming a grafana deployment in lyra-monitoring
            port:
              number: 80
