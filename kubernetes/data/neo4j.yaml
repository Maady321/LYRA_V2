apiVersion: v1
kind: Service
metadata:
  name: neo4j-headless
  namespace: lyra-data
  labels:
    app: neo4j
spec:
  ports:
  - port: 7687
    name: bolt
  - port: 7474
    name: http
  clusterIP: None
  selector:
    app: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: lyra-data
spec:
  serviceName: "neo4j-headless"
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5
        ports:
        - containerPort: 7687
        - containerPort: 7474
        env:
        - name: NEO4J_AUTH
          value: "neo4j/lyra_graph_password_123"
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        livenessProbe:
          tcpSocket:
            port: 7687
          initialDelaySeconds: 30
          timeoutSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: neo4j-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 50Gi
